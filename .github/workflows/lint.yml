name: Lint

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "apps/web/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "apps/web/**"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Ruff lint
        uses: astral-sh/ruff-action@v1
        with:
          args: "check"
          src: "./apps/backend/app"

      - name: Ruff format check
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check"
          src: "./apps/backend/app"

  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run lint
        run: uv run task lint

      - name: Run type check
        run: uv run task typecheck

      - name: Check formatting
        run: uv run task format-check
